name: Update Public Firmware Release

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/*.hex'

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve artifact metadata
        id: meta
        run: |
          set -euo pipefail

          ARTIFACT_PATH=$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" | grep -E '^artifacts/.*\.hex$' | head -n 1)
          if [ -z "$ARTIFACT_PATH" ] || [ ! -f "$ARTIFACT_PATH" ]; then
            echo "Could not resolve the pushed .hex artifact from commit $GITHUB_SHA"
            exit 1
          fi

          FILE_NAME=$(basename "$ARTIFACT_PATH")
          VERSION=$(echo "$FILE_NAME" | sed -E 's/^grblHAL_LS_Laser-v([0-9]+\.[0-9]+\.[0-9]+)\.hex$/\1/')
          if [ -z "$VERSION" ] || [ "$VERSION" = "$FILE_NAME" ]; then
            echo "Could not resolve version from artifact name $FILE_NAME"
            exit 1
          fi

          echo "ARTIFACT_PATH=$ARTIFACT_PATH" >> "$GITHUB_OUTPUT"
          echo "FILE_NAME=$FILE_NAME" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.VERSION }}
          name: Release v${{ steps.meta.outputs.VERSION }}
          body_path: revisions.txt
          draft: false
          prerelease: false
          overwrite_files: true
          files: ${{ steps.meta.outputs.ARTIFACT_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release.json metadata
        run: |
          set -euo pipefail

          VERSION="${{ steps.meta.outputs.VERSION }}"
          FILE_NAME="${{ steps.meta.outputs.FILE_NAME }}"
          RELEASE_DATA=$(curl -fsSL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v$VERSION")

          FW_URL=$(echo "$RELEASE_DATA" | jq -er --arg fileName "$FILE_NAME" '.assets[] | select(.name == $fileName) | .browser_download_url' | head -n 1)

          jq -n \
            --arg version "$VERSION" \
            --arg firmwareAssetUrl "$FW_URL" \
            '{
              version: $version,
              firmwareAssetUrl: $firmwareAssetUrl
            }' > release.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release.json

          if git diff --cached --quiet; then
            echo "No release.json changes to push."
            exit 0
          fi

          git commit -m "Update firmware release metadata to v$VERSION"
          git push
