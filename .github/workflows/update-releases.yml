name: Update Public Firmware Release

on:
  repository_dispatch:
    types: [new-firmware-release]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.client_payload.version }}
          name: Release v${{ github.event.client_payload.version }}
          body: ${{ github.event.client_payload.notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release.json metadata
        run: |
          set -euo pipefail

          VERSION="${{ github.event.client_payload.version }}"

          RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v$VERSION")

          FW_URL=$(echo "$RELEASE_DATA" | jq -er '.assets[] | select(.name | endswith(".hex")) | .browser_download_url' | head -n 1)
          NOTES_URL="https://github.com/${{ github.repository }}/releases/tag/v$VERSION"

          jq -n \
            --arg version "$VERSION" \
            --arg releaseNotes "$NOTES_URL" \
            --arg firmwareAssetUrl "$FW_URL" \
            '{
              version: $version,
              releaseNotes: $releaseNotes,
              firmwareAssetUrl: $firmwareAssetUrl
            }' > release.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release.json
          git commit -m "Update firmware release metadata to v$VERSION" || echo "No changes"
          git push
