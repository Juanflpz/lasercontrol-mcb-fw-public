name: Update Public Firmware Release

on:
  repository_dispatch:
    types: [new-firmware-release]

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.client_payload.version }}
          name: Release v${{ github.event.client_payload.version }}
          body: |
            ## What's New
            ${{ github.event.client_payload.notes }}
            
            ## MCB firmware v${{ github.event.client_payload.version }}
            
            Firmware asset is ready for download.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release.json metadata
        run: |
          VERSION="${{ github.event.client_payload.version }}"

          RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v$VERSION")

          FW_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | endswith(".hex")) | .browser_download_url' | head -n 1)
          NOTES_URL="https://github.com/${{ github.repository }}/releases/tag/v$VERSION"

          if [ -f release.json ]; then
            TOOL_URL=$(jq -r '.windowsToolUrl // ""' release.json)
            TOOL_EXEC=$(jq -r '.windowsToolExecutable // "teensy_loader_cli.exe"' release.json)
          else
            TOOL_URL="https://www.pjrc.com/teensy/teensy_loader_cli_windows.zip"
            TOOL_EXEC="teensy_loader_cli.exe"
          fi

          cat <<EOF > release.json
          {
            "version": "$VERSION",
            "releaseNotes": "$NOTES_URL",
            "firmwareAssetUrl": "$FW_URL",
            "windowsToolUrl": "$TOOL_URL",
            "windowsToolExecutable": "$TOOL_EXEC"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release.json
          git commit -m "Update firmware release metadata to v$VERSION" || echo "No changes"
          git push
